<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#b33939">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Prashna Chakra</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #f5f5f5;
}

img {
    width: 100%;
    max-width: 600px;
    height: auto;
    margin-top: 20px;
}

#resultBox {
    margin-top: 30px;
    padding: 20px;
    width: 90%;
    max-width: 600px;
    box-sizing: border-box;
    margin-left: auto;
    margin-right: auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
    font-size: 18px;
    line-height: 1.5;
}

select {
    padding: 12px;
    font-size: 16px;
    margin: 10px 0 20px 0;
    width: 80%;
    max-width: 400px;
    box-sizing: border-box;
    border-radius: 5px;
    border: 1px solid #ccc;
    cursor: pointer;
}

#resetBtn {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 16px;
    background-color: #b33939;
    color: white;
    width: 90%;
    max-width: 350px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

#resetBtn:hover {
    background-color: #8f2d2d;
}

#instructionText {
    font-size: 16px;
    color: #b33939;
    font-weight: bold;
    margin-bottom: 10px;
    padding: 0 15px;
}

#langSelector {
    text-align: right;
    padding: 10px 20px;
}

#langSelect {
    padding: 8px;
    font-size: 14px;
    width: auto;
    margin: 0;
    border-radius: 5px;
}
</style>
</head>

<body>

<div id="langSelector">
    <select id="langSelect" onchange="changeLanguage(this.value)">
        <option value="kn">ಕನ್ನಡ (Kannada)</option>
        <option value="te">తెలుగు (Telugu)</option>
        <option value="en">English</option>
        <option value="sa">संस्कृतम् (Sanskrit)</option>
    </select>
</div>

<h2 id="chakraTitle">ಶ್ರೀ ಪ್ರಶ್ನಾ ಚಕ್ರ</h2>

<div id="step1">
    <select id="chakraSelect">
        <option value="" id="defaultSelectOpt">-- ನಿಮ್ಮ ಪ್ರಶ್ನೆಯನ್ನು ಆರಿಸಿ (Select Question) --</option>
    </select>
</div>

<div id="step2" style="display: none;">
    <p id="instructionText" style="line-height: 1.6;">
        <span id="instLine1">👉 ಭಗವಂತನನ್ನು ಸ್ಮರಿಸಿಕೊಂಡು ಈ ಕೆಳಗಿನ ಚಕ್ರದ ದಳಗಳ ಮೇಲೆ ಕ್ಲಿಕ್ ಮಾಡಿ.</span><br>
        <span id="instLine2">👉 ಪ್ರತಿಯೊಂದು ದಳವು ವಿಭಿನ್ನ ಫಲಿತಾಂಶವನ್ನು ನೀಡುತ್ತದೆ.</span>
    </p>
    <!-- IMAGE -->
    <img id="chakraImage" src="chakra.png" alt="ಶ್ರೀ ಪ್ರಶ್ನಾ ಚಕ್ರ" usemap="#image-map">

    <!-- IMAGE MAP -->
    <map name="image-map">

    <area shape="poly" coords="1652,1190,1546,1149,1457,1128,1365,1096,1264,1064,1196,1037,1200,992,1204,945,1295,915,1414,877,1501,848,1591,824,1655,805,1729,828,1791,858,1859,896,1903,935,1941,984,1926,1022,1852,1086,1744,1151,1684,1181" href="#" onclick="handleClick(event,1)">

    <area shape="poly" coords="1172,1081,1189,1062,1244,1068,1304,1083,1376,1115,1425,1128,1502,1145,1578,1181,1640,1196,1688,1247,1714,1300,1735,1353,1757,1427,1763,1481,1691,1500,1638,1498,1576,1495,1495,1491,1421,1444,1366,1372,1306,1298,1232,1190,1178,1137,1155,1098" href="#" onclick="handleClick(event,2)">

    <area shape="poly" coords="1195,1175,1230,1219,1263,1258,1295,1300,1334,1347,1368,1391,1404,1449,1425,1502,1423,1583,1408,1631,1399,1693,1363,1744,1346,1769,1295,1759,1227,1718,1174,1674,1132,1638,1089,1595,1074,1515,1072,1444,1070,1351,1064,1291,1068,1194,1072,1119,1100,1109,1144,1094" href="#" onclick="handleClick(event,3)">

    <area shape="poly" coords="1059,1124,1062,1192,1051,1262,1055,1326,1061,1368,1061,1430,1066,1508,1068,1549,1049,1595,1025,1640,977,1691,898,1740,823,1776,772,1704,741,1616,724,1523,736,1476,790,1398,858,1300,919,1217,964,1153,1006,1107,1030,1109" href="#" onclick="handleClick(event,4)">

    <area shape="poly" coords="972,1060,987,1081,987,1109,917,1198,857,1270,800,1345,747,1434,707,1481,562,1512,498,1512,430,1512,390,1498,390,1438,405,1360,430,1285,469,1211,515,1187,649,1149,753,1107,874,1062,949,1043" href="#" onclick="handleClick(event,5)">

    <area shape="poly" coords="456,1177,364,1128,265,1064,207,996,228,958,296,896,358,852,433,822,498,809,569,830,647,848,743,884,826,915,898,939,953,954,953,994,955,1024,809,1069,736,1100,620,1136,517,1177" href="#" onclick="handleClick(event,6)">

    <area shape="poly" coords="458,754,413,684,392,595,386,514,399,487,464,480,522,486,602,482,673,508,721,531,762,595,809,654,836,701,879,752,919,805,955,856,983,892,951,935,836,899,677,845,520,795,479,773" href="#" onclick="handleClick(event,7)">

    <area shape="poly" coords="960,841,909,771,851,684,772,573,719,499,715,418,726,338,762,257,794,208,857,223,938,270,991,316,1061,393,1062,457,1059,574,1057,678,1057,767,1062,835,1053,864,1004,884" href="#" onclick="handleClick(event,8)">

    <area shape="poly" coords="1072,854,1072,760,1077,625,1083,501,1074,399,1123,340,1193,280,1247,249,1312,217,1340,212,1374,272,1402,350,1419,419,1429,484,1419,522,1336,625,1240,758,1181,845,1145,890,1079,864" href="#" onclick="handleClick(event,9)">

    <area shape="poly" coords="1164,888,1217,814,1306,703,1385,584,1453,501,1542,472,1659,459,1735,469,1756,480,1752,542,1737,641,1695,727,1655,790,1544,824,1425,862,1300,903,1200,935" href="#" onclick="handleClick(event,10)">

    <!-- CENTER -->
    <area shape="poly" coords="994,935,1025,905,1077,894,1115,907,1159,935,1176,984,1159,1032,1121,1073,1049,1086,998,1062,974,1003,974,964" href="#" onclick="showCenter(event)">

    </map>
</div>

<div id="step3" style="display: none;">
    <div id="resultBox"></div>
    <button id="resetBtn" onclick="resetApp()">ಮತ್ತೊಂದು ಪ್ರಶ್ನೆ ಕೇಳಿ (Try different Question)</button>
</div>

<script>

let database = [];
let currentSelectedQNo = "";
let resizeMapFunc = null;
let currentLang = 'kn';
let currentSelectedKarakaNo = null;
let centerClicked = false;

const translations = {
    kn: {
        title: "ಶ್ರೀ ಪ್ರಶ್ನಾ ಚಕ್ರ",
        select: "-- ನಿಮ್ಮ ಪ್ರಶ್ನೆಯನ್ನು ಆರಿಸಿ --",
        inst1: "👉 ಭಗವಂತನನ್ನು ಸ್ಮರಿಸಿಕೊಂಡು ಈ ಕೆಳಗಿನ ಚಕ್ರದ ದಳಗಳ ಮೇಲೆ ಕ್ಲಿಕ್ ಮಾಡಿ.",
        inst2: "👉 ಪ್ರತಿಯೊಂದು ದಳವು ವಿಭಿನ್ನ ಫಲಿತಾಂಶವನ್ನು ನೀಡುತ್ತದೆ.",
        reset: "ಮತ್ತೊಂದು ಪ್ರಶ್ನೆ ಕೇಳಿ",
        resultLbl: "ಫಲಿತಾಂಶ:",
        noResult: "⚠️ ಫಲಿತಾಂಶ ಲಭ್ಯವಿಲ್ಲ",
        qNo: "ಪ್ರಶ್ನೆ ಸಂಖ್ಯೆ:"
    },
    te: {
        title: "శ్రీ ప్రశ్నా చక్రం",
        select: "-- మీ ప్రశ్నను ఎంచుకోండి --",
        inst1: "👉 భగవంతుని స్మరించుకుని ఈ క్రింది చక్ర దళాలపై క్లిక్ చేయండి.",
        inst2: "👉 ప్రతి దళం విభిన్న ఫలితాన్ని ఇస్తుంది.",
        reset: "మరొక ప్రశ్న అడగండి",
        resultLbl: "ఫలితం:",
        noResult: "⚠️ ఫలితం అందుబాటులో లేదు",
        qNo: "ప్రశ్న సంఖ్య:"
    },
    en: {
        title: "Sri Prashna Chakra",
        select: "-- Select your question --",
        inst1: "👉 Remember the Almighty and click on the petals of the chakra below.",
        inst2: "👉 Each petal gives a different result.",
        reset: "Ask another question",
        resultLbl: "Result:",
        noResult: "⚠️ Result not available",
        qNo: "Question No:"
    },
    sa: {
        title: "श्री प्रश्न चक्रम्",
        select: "-- भवतः प्रश्नं चिनोतु --",
        inst1: "👉 भगवन्तं स्मृत्वा अधः चक्रस्य दलेषु नुदन्तु।",
        inst2: "👉 एकैकं दलं भिन्नं फलं ददाति।",
        reset: "अन्यं प्रश्नं पृच्छतु",
        resultLbl: "परिणाम:",
        noResult: "⚠️ परिणामः न लभ्यते",
        qNo: "प्रश्नसङ्ख्या:"
    }
};

function populateDropdown() {
    const select = document.getElementById('chakraSelect');
    const defaultOpt = document.getElementById('defaultSelectOpt');
    const selectedValue = select.value;
    
    select.innerHTML = '';
    select.appendChild(defaultOpt);
    
    const seenQnos = new Set();
    
    database.forEach(item => {
        if(item.Q_no && !seenQnos.has(item.Q_no)) {
            seenQnos.add(item.Q_no);
            const opt = document.createElement('option');
            opt.value = item.Q_no;
            opt.textContent = item.Q_no + ". " + (item.Chakra_Name[currentLang] || item.Chakra_Name['kn']);
            select.appendChild(opt);
        }
    });
    
    select.value = selectedValue;
    if(currentSelectedQNo) {
        const selectedOption = select.options[select.selectedIndex];
        if (selectedOption) {
            document.getElementById("chakraTitle").innerText = selectedOption.text.split('. ')[1] || selectedOption.text;
        }
    }
}

function changeLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    
    if(!currentSelectedQNo) {
        document.getElementById("chakraTitle").innerText = translations[lang].title;
    }
    document.getElementById("defaultSelectOpt").innerText = translations[lang].select;
    document.getElementById("instLine1").innerText = translations[lang].inst1;
    document.getElementById("instLine2").innerText = translations[lang].inst2;
    document.getElementById("resetBtn").innerText = translations[lang].reset;
    
    if(database.length > 0) {
        populateDropdown();
    }
    
    if(currentSelectedQNo && currentSelectedKarakaNo !== null) {
        handleClick(new Event('click'), currentSelectedKarakaNo, false);
    } else if(currentSelectedQNo && centerClicked) {
        showCenter(new Event('click'), false);
    }
}

// యూజర్ ప్రశ్నను ఎంచుకున్నప్పుడు
document.getElementById('chakraSelect').addEventListener('change', function() {
    currentSelectedQNo = this.value;
    const title = document.getElementById("chakraTitle");
    
    if(currentSelectedQNo) {
        title.innerText = this.options[this.selectedIndex].text.split('. ')[1] || this.options[this.selectedIndex].text;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('step3').style.display = 'none';
        
        // ఇమేజ్ కనిపించిన తర్వాత కోఆర్డినేట్స్ క్యాలిక్యులేట్ చేయడానికి
        if (resizeMapFunc) {
            setTimeout(resizeMapFunc, 50);
        }
    }
});

function resetApp() {
    document.getElementById('step1').style.display = 'block';
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'none';
    document.getElementById('chakraTitle').innerText = translations[currentLang].title;
    document.getElementById('chakraSelect').value = "";
    currentSelectedQNo = "";
    currentSelectedKarakaNo = null;
    centerClicked = false;
}

function handleClick(event, num, changeStep = true) {
    event.preventDefault(); // 🔥 VERY IMPORTANT
    const resultBox = document.getElementById("resultBox");
    currentSelectedKarakaNo = num;
    centerClicked = false;
    
    if (!currentSelectedQNo) return;

    // యూజర్ ఎంచుకున్న ప్రశ్న, మరియు క్లిక్ చేసిన దళం నంబర్ బట్టి వెతకడం
    const resultRow = database.find(item => item.Q_no === currentSelectedQNo && parseInt(item.karaka_no) === num);
    
    if (resultRow) {
        const karakaName = resultRow.karaka_name[currentLang] || resultRow.karaka_name['kn'];
        const chakraResult = resultRow.chakra_result[currentLang] || resultRow.chakra_result['kn'];
        resultBox.innerHTML = `<strong>${translations[currentLang].resultLbl}</strong><br><br><span style="color:#b33939; font-weight:bold;">${karakaName}</span>: ${chakraResult}`;
    } else {
        resultBox.innerHTML = `⚠️ ${translations[currentLang].noResult}`;
    }

    if (changeStep) {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
    }
}

function showCenter(event, changeStep = true) {
    event.preventDefault();
    currentSelectedKarakaNo = null;
    centerClicked = true;
    if (currentSelectedQNo) {
        document.getElementById("resultBox").innerHTML = `<strong>${translations[currentLang].qNo}</strong> ` + currentSelectedQNo;
        if (changeStep) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
        }
    }
}

// Service Worker Registration for PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registered successfully.'))
            .catch(err => console.error('Service Worker registration failed:', err));
    });
}

// JSON ఫైల్ నుండి డేటాబేస్ లోడ్ చేయడం
async function loadData() {
    try {
        // Cache-busting query parameter to prevent loading old data
        const response = await fetch(`data.json?v=${new Date().getTime()}`);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        database = await response.json();
        populateDropdown();
    } catch (error) {
        console.error("Error loading JSON:", error);
        document.getElementById("resultBox").innerHTML = "⚠️ ಡೇಟಾಬೇಸ್ ಲೋಡ್ ಆಗಿಲ್ಲ. ದಯವಿಟ್ಟು ಸರ್ವರ್ ಬಳಸಿ.";
    }
}

// ఇమేజ్ సైజు మారినప్పుడు కోఆర్డినేట్స్ కూడా ఆటోమేటిక్ గా మారడానికి (Responsive Image Map)
window.addEventListener('load', function() {
    loadData(); // డేటాబేస్ లోడ్ చేయడం
    changeLanguage(currentLang); // Set default language UI text

    const img = document.getElementById('chakraImage');
    const areas = document.querySelectorAll('map[name="image-map"] area');
    
    // ఒరిజినల్ కోఆర్డినేట్స్ ని స్టోర్ చేసుకోవడం
    areas.forEach(area => {
        area.dataset.originalCoords = area.coords;
    });

    function resizeMap() {
        if (!img.naturalWidth || img.clientWidth === 0) return; 
        
        const scaleX = img.clientWidth / img.naturalWidth;
        const scaleY = img.clientHeight / img.naturalHeight;

        areas.forEach(area => {
            const coords = area.dataset.originalCoords.split(',');
            const newCoords = coords.map((coord, index) => {
                return Math.round(coord * (index % 2 === 0 ? scaleX : scaleY));
            });
            area.coords = newCoords.join(',');
        });
    }
    resizeMapFunc = resizeMap;

    resizeMap();
    window.addEventListener('resize', resizeMap);
});

</script>

</body>
</html>
